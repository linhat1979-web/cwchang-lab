# ==========================================
# 1. 核心服務設定 (解決新版 Hugo 報錯的關鍵)
# ==========================================
services:
  googleAnalytics:
    id: "" # 必須存在，否則新版 Hugo 會報錯

# ==========================================
# 2. 網站基本資訊
# ==========================================
title: CW Chang Lab
baseURL: https://cwc-lab.netlify.app/
copyright: "© {year} CW Chang Lab"

# 啟用最新 Hugo Blox 引擎
module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

# ==========================================
# 3. 語言與路徑設定 (鎖定單一語言最穩定)
# ==========================================
defaultContentLanguage: zh
hasCJKLanguage: true
languages:
  zh:
    languageName: 中文
    contentDir: content/zh
    title: CW Chang Lab

# ==========================================
# 4. 導航選單 (連結首頁組件)
# ==========================================
menu:
  zh:
    - name: 最新消息
      url: '#news'
      weight: 10
    - name: 實驗室成員
      url: '#people'
      weight: 20
    - name: 論文著作
      url: '#publications'
      weight: 30
    - name: 儀器介紹
      url: '#equipments'
      weight: 40

# ==========================================
# 5. 網站參數與安全設定
# ==========================================
params:
  appearance:
    theme_day: minimal
    theme_night: minimal
  marketing:
    google_analytics: ""

taxonomies:
  author: authors
  tag: tags
  category: categories

security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_POST_CSS$'

markup:
  goldmark:
    renderer:
      unsafe: true