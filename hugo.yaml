title: CW Chang Lab
baseURL: https://cwc-lab.netlify.app/

# 啟用 Hugo Blox 引擎
module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

# 語言設定 (只留中文，避免系統去抓不存在的英文首頁)
defaultContentLanguage: zh
hasCJKLanguage: true
languages:
  zh:
    languageName: 中文
    contentDir: content/zh

# 讓主持人區塊能運作
taxonomies:
  author: authors

# 安全編譯設定
security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_POST_CSS$'