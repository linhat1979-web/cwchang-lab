# 放置在檔案最上方
baseURL: https://cwc-lab.netlify.app/
title: CW Chang Lab

# 解決 WC_POST_CSS 報錯的唯一設定
security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_POST_CSS$'

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

defaultContentLanguage: zh
languages:
  zh:
    languageName: 中文
    contentDir: content/zh

taxonomies:
  author: authors