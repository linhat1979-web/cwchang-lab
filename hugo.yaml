# ==========================================
# 1. 核心設定
# ==========================================
title: CW Chang Lab
baseURL: https://cwc-lab.netlify.app/
copyright: "© {year} CW Chang Lab"

module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

# ==========================================
# 2. 語言與分類
# ==========================================
defaultContentLanguage: zh
hasCJKLanguage: true
languages:
  zh:
    languageName: 中文
    contentDir: content/zh

taxonomies:
  author: authors
  tag: tags
  category: categories

# ==========================================
# 3. 導航選單
# ==========================================
menu:
  zh:
    - name: 最新消息
      url: '#news'
      weight: 10
    - name: 實驗室成員
      url: '#people'
      weight: 20
    - name: 論文著作
      url: '#publications'
      weight: 30
    - name: 儀器介紹
      url: '#equipments'
      weight: 40

# ==========================================
# 4. 參數與安全 (徹底避開 Analytics 報錯)
# ==========================================
params:
  appearance:
    theme_day: minimal
    theme_night: minimal

security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_POST_CSS$'

markup:
  goldmark:
    renderer:
      unsafe: true