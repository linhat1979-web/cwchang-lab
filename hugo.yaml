title: CW Chang Lab
baseURL: https://cwc-lab.netlify.app/
copyright: "© {year} CW Chang Lab"

# 1. 引擎模組
module:
  imports:
    - path: github.com/HugoBlox/hugo-blox-builder/modules/blox-bootstrap/v5

# 2. 語言設定 (只留中文，避免路徑報錯)
defaultContentLanguage: zh
hasCJKLanguage: true
languages:
  zh:
    languageName: 中文
    contentDir: content/zh

# 3. 導航選單
menu:
  zh:
    - name: 最新消息
      url: '#news'
      weight: 10
    - name: 實驗室成員
      url: '#people'
      weight: 20
    - name: 論文著作
      url: '#publications'
      weight: 30
    - name: 儀器介紹
      url: '#equipments'
      weight: 40

# 4. 解決主持人報錯的關鍵分類
taxonomies:
  author: authors
  tag: tags
  category: categories

# 5. 安全編譯設定
security:
  funcs:
    getenv:
      - '^HUGO_'
      - '^CI$'
      - '^WC_POST_CSS$'